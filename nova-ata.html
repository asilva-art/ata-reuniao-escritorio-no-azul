<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nova Ata | Hub de Atas</title>
  <style>
    :root { --bg:#f7f7f5; --card:#fff; --text:#1f2328; --line:#e7e8ea; --muted:#5f6b7a; --accent:#0f766e; --shadow:0 12px 30px rgba(0,0,0,.06); --radius:14px; }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Avenir Next","Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    main{width:min(940px,92vw);margin:28px auto 46px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
    h1{margin:0 0 6px;font-size:1.35rem}
    p{margin:0 0 10px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    label{display:block;font-size:.82rem;color:#5f6b7a;margin-bottom:4px}
    input,select,textarea{width:100%;border:1px solid #cfd8dc;border-radius:8px;padding:8px 9px;font:0.9rem/1.4 "Avenir Next","Segoe UI",sans-serif}
    textarea{min-height:90px;resize:vertical}
    .btn{border:1px solid #c8d6d5;background:#fff;color:#134e4a;border-radius:999px;font-size:.84rem;padding:8px 12px;cursor:pointer;text-decoration:none;display:inline-block}
    .btn:hover{background:#ecfdf5}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    pre{margin:0;white-space:pre-wrap;word-break:break-word;font:0.86rem/1.48 ui-monospace,Menlo,Consolas,monospace;background:#f8fafb;border:1px solid #e6eaed;border-radius:10px;padding:12px}
    .hint{font-size:.86rem;color:#5f6b7a}
    @media (max-width:800px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Nova ata (automático)</h1>
      <p>Preencha os dados e clique em <strong>Publicar automaticamente</strong>. Não precisa de token no navegador.</p>
      <p class="hint">Fluxo: página -> endpoint serverless -> issue automático -> GitHub Action cria/atualiza ata + catálogo.</p>
      <div class="actions">
        <a class="btn" href="./index.html">Voltar ao Hub</a>
      </div>
    </section>

    <section class="card">
      <div class="grid">
        <div>
          <label>Número da ata</label>
          <input id="ata-numero" value="002" />
        </div>
        <div>
          <label>Data (AAAA-MM-DD)</label>
          <input id="ata-data" value="2026-03-06" />
        </div>
        <div>
          <label>Título da ata</label>
          <input id="ata-titulo" value="Reunião de Pendências" />
        </div>
        <div>
          <label>Prioridade</label>
          <select id="ata-prioridade">
            <option>alta</option>
            <option selected>média</option>
            <option>baixa</option>
          </select>
        </div>
        <div>
          <label>Status inicial</label>
          <select id="ata-status-inicial">
            <option selected>rascunho</option>
            <option>publicada</option>
          </select>
        </div>
        <div style="grid-column:1/-1;">
          <label>Participantes</label>
          <input id="ata-participantes" value="Layene Oliveira (Skala Lançamentos) e Alencar Silva (Lube Digital)" />
        </div>
      </div>
      <div class="actions">
        <button class="btn" id="gerar" type="button">Gerar pacote</button>
        <button class="btn" id="copiar" type="button">Copiar resumo</button>
        <button class="btn" id="publicar" type="button">Publicar automaticamente</button>
      </div>
      <p id="status-publicacao" class="hint" style="margin-top:10px;"></p>
    </section>

    <section class="card">
      <p><strong>Resumo para criação/publicação:</strong></p>
      <pre id="saida">Clique em "Gerar pacote".</pre>
    </section>
  </main>

  <script>
    const API_BASE = window.ATA_API_BASE || 'https://ata-hub-publisher.asilva-e21.workers.dev';

    const slugify = (txt) => txt
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '')
      .slice(0, 80);

    const out = document.getElementById('saida');
    const publishBtn = document.getElementById('publicar');
    const statusEl = document.getElementById('status-publicacao');
    const REPO = 'asilva-art/ata-reuniao-escritorio-no-azul';

    const buildPayload = () => {
      const numero = document.getElementById('ata-numero').value.trim() || '000';
      const data = document.getElementById('ata-data').value.trim() || '2026-01-01';
      const titulo = document.getElementById('ata-titulo').value.trim() || 'Reunião';
      const participantes = document.getElementById('ata-participantes').value.trim();
      const prioridade = document.getElementById('ata-prioridade').value.trim();
      const status_inicial = document.getElementById('ata-status-inicial').value.trim();
      const slug = `ata-${String(numero).padStart(3, '0')}-${slugify(titulo)}`;
      const caminho = `/profissional/entregas/${slug}/index.html`;

      return { numero, data, titulo, participantes, prioridade, status_inicial, slug, caminho };
    };

    const render = () => {
      const payload = buildPayload();
      const resumo = [
        `titulo: Ata ${String(payload.numero).padStart(3, '0')} • ${payload.titulo}`,
        `data: ${payload.data}`,
        `participantes: ${payload.participantes}`,
        `slug: ${payload.slug}`,
        `caminho_final: ${payload.caminho}`,
        'categoria: profissional/entregas',
        'tipo: profissional',
        `prioridade: ${payload.prioridade}`,
        `status_inicial: ${payload.status_inicial}`,
        '',
        'Ação automática:',
        '1) clicar em "Publicar automaticamente"',
        '2) a página envia para a API do GitHub',
        '3) workflow cria a ata e atualiza o catálogo'
      ].join('\n');

      out.textContent = resumo;
      return resumo;
    };

    document.getElementById('gerar').addEventListener('click', render);

    document.getElementById('copiar').addEventListener('click', async () => {
      const txt = render();
      try {
        await navigator.clipboard.writeText(txt);
        alert('Resumo copiado.');
      } catch (_) {
        alert('Não foi possível copiar automaticamente neste navegador.');
      }
    });

    const publishAutomatic = async () => {
      const payload = buildPayload();
      statusEl.textContent = 'Publicando...';

      try {
        const res = await fetch(`${API_BASE}/api/nova-ata`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            numero: payload.numero,
            data: payload.data,
            titulo: payload.titulo,
            participantes: payload.participantes,
            prioridade: payload.prioridade,
            status_inicial: payload.status_inicial
          })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) throw new Error(data.error || `Erro HTTP ${res.status}`);
        statusEl.textContent = 'Solicitação recebida. Confirmando criação da ata...';

        const catalogEntry = await waitForCatalogEntry(payload);
        if (!catalogEntry) {
          const fallbackAtaUrl = `https://asilva-art.github.io/ata-reuniao-escritorio-no-azul/profissional/entregas/${payload.slug}/`;
          const fallbackEditUrl = `https://github.com/${REPO}/edit/main/profissional/entregas/${payload.slug}/index.html`;
          statusEl.innerHTML = `Solicitação enviada. A ata ainda está processando. Tente em instantes: <a href="${fallbackAtaUrl}" target="_blank" rel="noopener noreferrer">Ver ata</a> ou <a href="${fallbackEditUrl}" target="_blank" rel="noopener noreferrer">Editar conteúdo</a>.`;
          return;
        }

        const ataUrl = `https://asilva-art.github.io/ata-reuniao-escritorio-no-azul${catalogEntry.link_final}`;
        const path = catalogEntry.link_final.replace(/^\//, '');
        const editUrl = `https://github.com/${REPO}/edit/main/${path}index.html`;
        statusEl.innerHTML = `Ata criada com sucesso. Clique em <a href="${ataUrl}" target="_blank" rel="noopener noreferrer">Ver ata</a> para visualizar e em <a href="${editUrl}" target="_blank" rel="noopener noreferrer">Editar conteúdo</a> para ajustar o texto.`;
      } catch (e) {
        statusEl.textContent = `Falha ao publicar automaticamente: ${e.message}. Se o endpoint ainda não estiver publicado, me avise para concluir o deploy serverless.`;
      }
    };

    const normalizeText = (txt) => (txt || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9 ]+/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();

    const waitForCatalogEntry = async (payload) => {
      const api = './catalogo.json';
      const desiredPrefix = `ata-${String(payload.numero).padStart(3, '0')}-`;
      const desiredDate = payload.data;
      const desiredTitle = normalizeText(payload.titulo);

      for (let i = 0; i < 20; i++) {
        try {
          const res = await fetch(api, { cache: 'no-store' });
          if (res.ok) {
            const entries = await res.json();
            const arr = Array.isArray(entries) ? entries : [];
            for (const it of arr) {
              const slug = String(it.slug || '');
              const dt = String(it.data || '');
              const title = normalizeText(String(it.titulo || ''));
              if (!slug.startsWith(desiredPrefix)) continue;
              if (dt !== desiredDate) continue;
              if (!title.includes(desiredTitle) && !desiredTitle.includes(title.replace(/^ata \d+\s*/, ''))) continue;
              return it;
            }
          }
        } catch (_) {}
        await new Promise((resolve) => setTimeout(resolve, 2500));
      }
      return null;
    };

    publishBtn.addEventListener('click', publishAutomatic);

    ['ata-numero', 'ata-data', 'ata-titulo', 'ata-prioridade', 'ata-status-inicial', 'ata-participantes'].forEach((id) => {
      document.getElementById(id).addEventListener('input', render);
      document.getElementById(id).addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
